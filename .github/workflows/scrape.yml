name: NIFTY Options Scraper

on:
  workflow_dispatch:
  schedule:
    # Run daily at 10:30 PM IST (5:00 PM UTC) — after market close + settlement
    - cron: '0 17 * * 1-5'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: DhanHQ_src/requirements.txt

      - name: Install dependencies
        run: pip install -r DhanHQ_src/requirements.txt

      - name: Create data directories
        run: mkdir -p data/bhavcopy

      - name: Run scraper pipeline
        env:
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m DhanHQ_src.main

      - name: Upload bhavcopy files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bhavcopy-${{ github.run_number }}
          path: data/bhavcopy/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload EDA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eda-${{ github.run_number }}
          path: docs/logs/supabase/eda_*/
          retention-days: 90
          if-no-files-found: ignore

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: DhanHQ_src/requirements.txt

      - name: Install dependencies
        run: pip install -r DhanHQ_src/requirements.txt

      - name: Run tests
        env:
          DHAN_CLIENT_ID: dummy
          DHAN_ACCESS_TOKEN: dummy
        run: python -m pytest tests/ -v --ignore=tests/supabase
